app = "crewport"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"

[env]
  CREWPORT_PORT = "8080"
  CREWPORT_DB_PATH = "/data/crewport.db"
  CREWPORT_ALLOWED_OPERATORS = "bobbyhiddn,jdlongmire"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "crewport_data"
  destination = "/data"
